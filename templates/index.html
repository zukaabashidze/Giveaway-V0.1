<!DOCTYPE html>
<html>
<head>
    <title>Giveaway</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        body { background: #0f0f1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a2e; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00d4ff; border: none; color: black; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h2>გათამაშება 🎁</h2>
        <input type="text" id="name" placeholder="სახელი გვარი">
        <input type="text" id="discord" placeholder="Discord სახელი">
        <input type="text" id="steam" placeholder="Steam სახელი">
        <button id="reg-btn" onclick="send()">რეგისტრაცია</button>
        <p id="msg"></p>
    </div>

    <script>
        async function checkVPN() {
            const btn = document.getElementById('reg-btn');
            const card = document.getElementById('main-card');
            
            // 1. ვამოწმებთ დროის სარტყელს (ყველაზე სწრაფი მეთოდი)
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            if (tz !== "Asia/Tbilisi") {
                blockUser("თქვენი დროის სარტყელი (Timezone) არასწორია. გათიშეთ VPN!");
                return;
            }

            try {
                // 2. ვამოწმებთ IP-ს
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.country !== "GE") {
                    blockUser("VPN აღმოჩენილია! რეგისტრაცია შესაძლებელია მხოლოდ საქართველოდან.");
                }
            } catch (e) {
                console.log("IP check failed, but timezone check is active.");
            }
        }

        function blockUser(message) {
            document.body.innerHTML = `
                <div style="text-align:center; margin-top:100px; font-family:sans-serif; color: white;">
                    <h1 style="color:#ff4b2b;">წვდომა უარყოფილია! 🛑</h1>
                    <p>${message}</p>
                    <button style="width:200px; padding:10px; background:#00d4ff; border:none; border-radius:5px;" 
                            onclick="location.reload()">განახლება</button>
                </div>`;
        }

        checkVPN();

        async function send() {
            const btn = document.getElementById('reg-btn');
            btn.disabled = true; // რომ ბევრჯერ არ დააჭიროს
            btn.innerText = "მოწმდება...";

            try {
                const fpLoad = await FingerprintJS.load();
                const fp = await fpLoad.get();
                
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        full_name: document.getElementById('name').value,
                        discord_tag: document.getElementById('discord').value,
                        steam_name: document.getElementById('steam').value,
                        fingerprint: fp.visitorId
                    })
                });
                
                const data = await res.json();
                document.getElementById('msg').innerText = data.message;
                
                if(data.status === "error") {
                    btn.disabled = false;
                    btn.innerText = "რეგისტრაცია";
                }
            } catch (err) {
                document.getElementById('msg').innerText = "მოხდა შეცდომა.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
